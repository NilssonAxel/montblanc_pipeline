# This is a Databricks asset bundle definition for montblanc_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: montblanc_pipeline
  uuid: 32855f56-027b-4067-aa18-58ffcf66768f

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/test/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: The SQL warehouse ID used by dbt tasks
  start_date:
    description: Start date for bronze ingestion (YYYY-MM-DD)
    default: "2020-01-01"
  end_date:
    description: End date for bronze ingestion when end_date_active is true (YYYY-MM-DD)
    default: "2020-02-28"
  end_date_active:
    description: If true, use end_date instead of today minus lag days
    default: "false"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-2bd7eee2-7f90.cloud.databricks.com
    variables:
      catalog: montblanc_dev
      schema: dev
      warehouse_id: bb85fa3f62758a19
      start_date: "2020-01-01"
      end_date: "2020-02-28"
      end_date_active: "true"

  test:
    mode: production
    workspace:
      host: https://dbc-2bd7eee2-7f90.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: montblanc_test
      schema: test
      warehouse_id: bb85fa3f62758a19
      start_date: "2020-01-01"
      end_date: "2020-02-28"
      end_date_active: "true"
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE

  prod:
    mode: production
    workspace:
      host: https://dbc-2bd7eee2-7f90.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: montblanc_prod
      schema: prod
      warehouse_id: bb85fa3f62758a19
      start_date: "2020-01-01"
      end_date_active: "false"
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
    resources:
      jobs:
        montblanc_pipeline:
          trigger:
            periodic:
              interval: 1
              unit: DAYS
